<!DOCTYPE html>
<html lang="en">

<head>
  <title>Study Planner</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="static/base.css"/>
</head>

<body>
  <nav class="navbar navbar-dark bg-dark">
    <a class="navbar-brand nav-link-right" href="/">Study Planner</a>
    <a class="nav-link text-light " href="/studysessions">Studysessions</a>
    <a class="nav-link text-light" href="/todos">Todos</a>
    <a class="nav-link text-light" href="/studygroups">Studygroups</a>
    <a class="nav-link text-light" href="/admin">Admin panel</a>
    <a class="nav-link text-light nav-link-left" href="{{ url_for('logout')}}">log out here</a>.
  </nav>
  
  {%- set messages = get_flashed_messages(with_categories=true) -%}
  {%- if messages -%}
    {%- for category,message in messages %}
    <p><strong>{{ category }}</strong> {{ message }}</p>
    {% endfor -%}
  {%- endif -%}
  {% block body %}{% endblock %}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
