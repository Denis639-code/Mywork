{% extends 'base.html' %}

{% block body%}
<div class="form-container">
  <h1>Sign In</h1>

  <form method="post">
    <div>
    {{ form.email.label }}
    {{ form.email }}
    </div>
    <div>
    {{ form.password.label }}
    {{ form.password }}
    </div>
    <div>
    {{ form.remember.label }}
    {{ form.remember }}
    {{ form.submit }}
    </div>
  </form>
  
  <p><a href="{{ url_for('register')}}">Sign up</a></p>
</div>
{% endblock body%}
